name: Dependency review

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Review dependency changes
        id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@v4

      - name: Note unsupported dependency graph
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "Dependency Review skipped because GitHub Dependency Graph is not enabled for this repository."
          echo "Enable it at Settings -> Security -> Code security and analysis to enforce dependency review in CI."
