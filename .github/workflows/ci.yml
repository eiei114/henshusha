name: CI

on:
  pull_request:
    paths:
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-checks:
    name: Fast checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Henshusha CLI regression smoke
        run: pnpm test:henshusha
