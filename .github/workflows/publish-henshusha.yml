name: Publish henshusha

on:
  push:
    branches:
      - main
    paths:
      - "packages/henshusha/**"
      - "packages/agent-kit/skills/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - ".github/workflows/publish-henshusha.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish if package version is new
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: henshusha
      PACKAGE_DIR: packages/henshusha
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with Node/pnpm path
        run: pnpm build

      - name: Build with Bun path
        run: bun run build:bun

      - name: Verify local symlinked CLI path
        run: node scripts/verify-henshusha-cli-entry.mjs

      - name: Read package version
        id: pkg
        shell: bash
        run: |
          VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          NAME=$(node -p "require('./${PACKAGE_DIR}/package.json').name")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          test "$NAME" = "$PACKAGE_NAME"

      - name: Check whether version already exists on npm
        id: exists
        shell: bash
        run: |
          if npm view "${PACKAGE_NAME}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${{ steps.pkg.outputs.version }} already exists; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${{ steps.pkg.outputs.version }} is new; publishing."
          fi

      - name: Pack dry run
        run: npm pack "./${PACKAGE_DIR}" --dry-run

      - name: Local scaffold smoke test
        shell: bash
        run: |
          rm -rf /tmp/henshu-local-smoke
          mkdir -p /tmp/henshu-local-smoke
          (cd /tmp/henshu-local-smoke && node "$GITHUB_WORKSPACE/${PACKAGE_DIR}/dist/index.js" demo)
          test -f /tmp/henshu-local-smoke/demo/.claude/skills/henshusha-render/SKILL.md
          test -f /tmp/henshu-local-smoke/demo/.codex/skills/henshusha-edit-timeline/SKILL.md
          test -f /tmp/henshu-local-smoke/demo/.pi/skills/henshusha-analyze-source/SKILL.md
          test -f /tmp/henshu-local-smoke/demo/projects/sample-video/timelines/main.timeline.json
          test -f /tmp/henshu-local-smoke/demo/projects/sample-video/scripts/edit-plan.md
          test -f /tmp/henshu-local-smoke/demo/projects/sample-video/scripts/digest-story.md
          test -f /tmp/henshu-local-smoke/demo/.claude/skills/henshusha-digest-story/SKILL.md
          test -f /tmp/henshu-local-smoke/demo/projects/sample-video/remotion/index.tsx
          test -f /tmp/henshu-local-smoke/demo/projects/sample-video/remotion/Root.tsx
          test -f /tmp/henshu-local-smoke/demo/remotion.config.ts
          (cd /tmp/henshu-local-smoke/demo && node "$GITHUB_WORKSPACE/${PACKAGE_DIR}/dist/index.js" validate projects/sample-video)
          (cd /tmp/henshu-local-smoke/demo && node "$GITHUB_WORKSPACE/${PACKAGE_DIR}/dist/index.js" render projects/sample-video --dry-run)
          (cd /tmp/henshu-local-smoke/demo && node "$GITHUB_WORKSPACE/${PACKAGE_DIR}/dist/index.js" remotion-props projects/sample-video)
          test -f /tmp/henshu-local-smoke/demo/projects/sample-video/jobs/render-plan.json
          test -f /tmp/henshu-local-smoke/demo/projects/sample-video/remotion/timeline-props.json

      - name: Publish to npm with trusted publishing
        if: steps.exists.outputs.exists == 'false'
        run: npm publish "./${PACKAGE_DIR}" --provenance --access public

      - name: Wait for npm registry propagation
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          for attempt in {1..18}; do
            if npm view "${PACKAGE_NAME}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
              echo "${PACKAGE_NAME}@${{ steps.pkg.outputs.version }} is visible on npm."
              exit 0
            fi
            echo "Waiting for npm registry propagation ($attempt/18)..."
            sleep 10
          done
          echo "${PACKAGE_NAME}@${{ steps.pkg.outputs.version }} did not become visible on npm in time."
          exit 1

      - name: Verify npx path
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          rm -rf /tmp/henshu-npm-smoke
          mkdir -p /tmp/henshu-npm-smoke
          touch /tmp/henshu-empty-npmrc
          for attempt in {1..12}; do
            rm -rf /tmp/henshu-npm-smoke/demo
            if (
              cd /tmp/henshu-npm-smoke &&
              NPM_CONFIG_USERCONFIG=/tmp/henshu-empty-npmrc NODE_AUTH_TOKEN= npx --yes --package "henshusha@${{ steps.pkg.outputs.version }}" -- henshusha demo &&
              test -f /tmp/henshu-npm-smoke/demo/.claude/skills/henshusha-render/SKILL.md &&
              test -f /tmp/henshu-npm-smoke/demo/.claude/skills/henshusha-digest-story/SKILL.md &&
              test -f /tmp/henshu-npm-smoke/demo/projects/sample-video/scripts/edit-plan.md &&
              test -f /tmp/henshu-npm-smoke/demo/projects/sample-video/scripts/digest-story.md
            ); then
              break
            fi
            if [ "$attempt" = "12" ]; then
              find /tmp/henshu-npm-smoke -maxdepth 6 -type f | sort || true
              exit 1
            fi
            echo "npx smoke failed or scaffold incomplete; retrying ($attempt/12)..."
            NPM_CONFIG_USERCONFIG=/tmp/henshu-empty-npmrc npm cache clean --force || true
            sleep 10
          done

      - name: Verify bunx path
        if: steps.exists.outputs.exists == 'false'
        shell: bash
        run: |
          rm -rf /tmp/henshu-bun-smoke
          mkdir -p /tmp/henshu-bun-smoke
          touch /tmp/henshu-empty-npmrc
          for attempt in {1..12}; do
            rm -rf /tmp/henshu-bun-smoke/demo
            if (
              cd /tmp/henshu-bun-smoke &&
              NPM_CONFIG_USERCONFIG=/tmp/henshu-empty-npmrc NODE_AUTH_TOKEN= bunx "henshusha@${{ steps.pkg.outputs.version }}" demo &&
              test -f /tmp/henshu-bun-smoke/demo/.codex/skills/henshusha-edit-timeline/SKILL.md &&
              test -f /tmp/henshu-bun-smoke/demo/.pi/skills/henshusha-digest-story/SKILL.md &&
              test -f /tmp/henshu-bun-smoke/demo/projects/sample-video/timelines/main.timeline.json &&
              test -f /tmp/henshu-bun-smoke/demo/projects/sample-video/scripts/digest-story.md
            ); then
              break
            fi
            if [ "$attempt" = "12" ]; then
              find /tmp/henshu-bun-smoke -maxdepth 6 -type f | sort || true
              exit 1
            fi
            echo "bunx smoke failed or scaffold incomplete; retrying ($attempt/12)..."
            bun pm cache rm || true
            sleep 10
          done

      - name: Create version tag
        if: steps.exists.outputs.exists == 'true' || success()
        shell: bash
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally; skipping."
            exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin; skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "henshusha ${{ steps.pkg.outputs.version }}"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub release $TAG already exists; skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --title "henshusha ${{ steps.pkg.outputs.version }}" \
            --generate-notes
